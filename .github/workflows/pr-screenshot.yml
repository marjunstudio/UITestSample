name: PR Screenshot

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

jobs:
  screenshot:
    runs-on: macos-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3.9.0
        with:
          distribution: 'zulu'
          java-version: 19

      - name: Gradle cache
        uses: gradle/gradle-build-action@v2

      - name: Fetch reference screenshots
        run: |
          mkdir -p composeApp/screenshots
          if git ls-remote --heads origin screenshots | grep -q screenshots; then
            git fetch origin screenshots --depth=1
            if git ls-tree origin/screenshots "main/" 2>/dev/null | grep -q .; then
              git checkout origin/screenshots -- "main/" 2>/dev/null || true
              cp main/*.png composeApp/screenshots/ 2>/dev/null || true
              cp main/*.gif composeApp/screenshots/ 2>/dev/null || true
              rm -rf main/
              echo "HAS_REFERENCE=true" >> $GITHUB_ENV
              echo "Reference screenshots fetched from main branch."
            else
              echo "HAS_REFERENCE=false" >> $GITHUB_ENV
              echo "No reference screenshots found for main branch."
            fi
          else
            echo "HAS_REFERENCE=false" >> $GITHUB_ENV
            echo "No screenshots branch found."
          fi

      - name: Generate screenshots
        run: |
          if [ "$HAS_REFERENCE" = "true" ]; then
            echo "Running compare (reference exists)"
            ./gradlew composeApp:compareRoborazziDebug -Proborazzi.test.record=false --stacktrace || true
          else
            echo "Running record (no reference)"
            ./gradlew composeApp:recordRoborazziDebug --stacktrace
          fi

      - name: Publish screenshots to screenshots branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: composeApp/screenshots
          publish_branch: screenshots
          destination_dir: pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment PR with screenshots
        uses: actions/github-script@v6
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'screenshots';
            const dir = `pr-${prNumber}`;

            // screenshotsブランチのファイル一覧を取得
            let files = [];
            try {
              const { data } = await github.rest.repos.getContent({
                owner, repo, path: dir, ref: branch,
              });
              files = data.filter(f => f.type === 'file' && (f.name.endsWith('.png') || f.name.endsWith('.gif')));
            } catch (e) {
              core.warning(`Could not list screenshots: ${e.message}`);
              return;
            }

            // compare画像と通常画像を分類
            const compareFiles = files.filter(f => f.name.includes('_compare'));
            const normalFiles = files.filter(f => !f.name.includes('_compare') && !f.name.includes('_actual'));
            const ts = Date.now();

            // コメント本文を構築
            let body = '## 📸 スクリーンショット\n\n';

            if (compareFiles.length > 0) {
              body += '### 🔍 UIの差分\n\n';
              body += '> 左: Before / 中: Diff / 右: After\n\n';
              body += '| テスト名 | Before / Diff / After |\n';
              body += '|---------|----------------------|\n';
              for (const file of compareFiles) {
                const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${dir}/${file.name}?t=${ts}`;
                const testName = file.name.replace('_compare.png', '');
                body += `| ${testName} | ![${testName}](${imageUrl}) |\n`;
              }
              body += '\n### 最新スクリーンショット\n\n';
              body += '| テスト名 | スクリーンショット |\n';
              body += '|---------|------------------|\n';
              for (const file of normalFiles) {
                const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${dir}/${file.name}?t=${ts}`;
                const testName = file.name.replace(/\.[^.]+$/, '');
                body += `| ${testName} | ![${testName}](${imageUrl}) |\n`;
              }
            } else {
              body += '| テスト名 | スクリーンショット |\n';
              body += '|---------|------------------|\n';
              for (const file of normalFiles) {
                const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${dir}/${file.name}`;
                const testName = file.name.replace(/\.[^.]+$/, '');
                body += `| ${testName} | ![${testName}](${imageUrl}) |\n`;
              }
            }
            body += `\n_最終更新: ${new Date().toISOString()}_`;

            // 既存コメントがあれば更新、なければ新規作成
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('📸 スクリーンショット')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
